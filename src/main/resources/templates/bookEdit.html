<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://kit.fontawesome.com/0faddc1af8.js" crossorigin="anonymous"></script>
    <title>Edit Book - Nostalgic Novel</title>
  </head>
  <body>
  
    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
      <div class="container">
        <a class="navbar-brand" th:href="@{/}">The Nostalgic Novel</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/available_books}">Available Books</a></li>
            <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" th:href="@{/my_books}">My Cart</a></li>
            <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" th:href="@{/orders}">My Orders</a></li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link active text-danger fw-bold" th:href="@{/admin/dashboard}">Admin Dashboard</a></li>
            <li class="nav-item" sec:authorize="!isAuthenticated()">
              <a class="nav-link" th:href="@{/login}"><i class="fa-solid fa-right-to-bracket me-1"></i>Login</a>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
              <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-link nav-link p-0" type="submit"><i class="fa-solid fa-right-from-bracket me-1"></i>Logout</button>
              </form>
            </li>
            <li class="nav-item ms-2">
              <button class="theme-toggle-btn" id="themeToggle"><i class="fa-solid fa-moon"></i></button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Container -->
    <div class="container main-content mt-4" style="max-width: 650px;">
        
        <div class="mb-4">
            <a th:href="@{/}" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-2"></i>Back to Home
            </a>
        </div>

        <div class="glass-panel">
            <div class="text-center mb-4">
                <i class="fa-solid fa-pen-to-square fa-3x text-primary mb-2"></i>
                <h3 class="fw-bold">Edit Book Details</h3>
                <p class="text-secondary" th:text="'Modifying: ' + ${book.name}">Modify book parameters</p>
            </div>

            <form th:action="@{/save}" method="post" enctype="multipart/form-data" th:object="${book}">
                
                <input type="hidden" name="id" th:value="${book.id}"/>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="name" class="form-label fw-semibold">Book Title</label>
                        <input type="text" class="form-control form-control-custom" id="name" name="name" th:value="${book.name}" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="author" class="form-label fw-semibold">Author</label>
                        <input type="text" class="form-control form-control-custom" id="author" name="author" th:value="${book.author}" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="price" class="form-label fw-semibold">Price ($)</label>
                        <input type="text" class="form-control form-control-custom" id="price" name="price" th:value="${book.price}" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="category" class="form-label fw-semibold">Category</label>
                        <input type="text" class="form-control form-control-custom" id="category" name="category" th:value="${book.category}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label fw-semibold">Description</label>
                    <textarea class="form-control form-control-custom" id="description" name="description" rows="4" placeholder="Enter book summary..." th:text="${book.description}" required></textarea>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6 mb-3">
                        <label for="coverFile" class="form-label fw-semibold">Update Cover Image</label>
                        <input type="file" class="form-control form-control-custom" id="coverFile" name="coverFile" accept="image/*">
                        <div class="form-text text-secondary" style="font-size: 0.75rem;">Leave empty to keep existing cover</div>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="pdfFile" class="form-label fw-semibold">Update E-Book PDF</label>
                        <input type="file" class="form-control form-control-custom" id="pdfFile" name="pdfFile" accept="application/pdf">
                        <div class="form-text text-secondary" style="font-size: 0.75rem;">Leave empty to keep existing PDF</div>
                    </div>
                </div>

                <div class="text-center d-grid">
                    <button type="submit" class="btn btn-gradient-primary btn-lg">
                        <i class="fa-solid fa-save me-2"></i>Save Changes
                    </button>
                </div>
                
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="text-center p-5 mt-5">
        <div class="footer-sect text-secondary">CopyRight @ 2026. All Rights Reserved</div>
        <div class="mt-2">
            <a href="#" class="text-decoration-none text-secondary me-3"><i class="fab fa-facebook"></i></a>
            <a href="#" class="text-decoration-none text-secondary me-3"><i class="fab fa-twitter"></i></a>
            <a href="#" class="text-decoration-none text-secondary me-3"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Dark Mode Logic
        const themeToggle = document.getElementById('themeToggle');
        
        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fa-solid fa-sun text-warning"></i>';
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
                localStorage.setItem('theme', 'light');
            }
        }

        themeToggle.addEventListener('click', () => {
            if (document.body.classList.contains('dark-mode')) {
                setTheme('light');
            } else {
                setTheme('dark');
            }
        });

        // Initialize theme
        setTheme(localStorage.getItem('theme') || 'light');
    </script>
  </body>
</html>
