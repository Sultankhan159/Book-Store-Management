<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://kit.fontawesome.com/0faddc1af8.js" crossorigin="anonymous"></script>
    <title>Available Books - Nostalgic Novel</title>
  </head>
  <body>
  
    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
      <div class="container">
        <a class="navbar-brand" th:href="@{/}">The Nostalgic Novel</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
            <li class="nav-item"><a class="nav-link active" th:href="@{/available_books}">Available Books</a></li>
            <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" th:href="@{/my_books}">My Cart</a></li>
            <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" th:href="@{/orders}">My Orders</a></li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link text-danger fw-bold" th:href="@{/admin/dashboard}">Admin Dashboard</a></li>
            <li class="nav-item" sec:authorize="!isAuthenticated()">
              <a class="nav-link" th:href="@{/login}"><i class="fa-solid fa-right-to-bracket me-1"></i>Login</a>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
              <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-link nav-link p-0" type="submit"><i class="fa-solid fa-right-from-bracket me-1"></i>Logout</button>
              </form>
            </li>
            <li class="nav-item ms-2">
              <button class="theme-toggle-btn" id="themeToggle"><i class="fa-solid fa-moon"></i></button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container main-content mt-4">
        
        <div class="mb-4">
            <a th:href="@{/}" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-2"></i>Back to Home
            </a>
        </div>
        <!-- Search & Filter Area -->
        <div class="glass-panel mb-5">
            <form th:action="@{/available_books}" method="get" class="row g-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0" style="border: 2px solid var(--border-color); border-radius: 12px 0 0 12px;"><i class="fa-solid fa-magnifying-glass text-secondary"></i></span>
                        <input type="text" class="form-control form-control-custom border-start-0" style="border-radius: 0 12px 12px 0 !important;"
                               name="query" th:value="${selectedQuery}" placeholder="Search books by title or author...">
                    </div>
                </div>
                
                <div class="col-md-4">
                    <select class="form-select form-control-custom" name="category">
                        <option value="">All Categories</option>
                        <option th:each="cat : ${categories}" 
                                th:value="${cat}" 
                                th:text="${cat}"
                                th:selected="${cat == selectedCategory}"></option>
                    </select>
                </div>
                
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-gradient-primary">
                        <i class="fa-solid fa-filter me-1"></i>Filter
                    </button>
                </div>
            </form>
        </div>

        <!-- Books Grid -->
        <div class="row">
            <div th:if="${book.isEmpty()}" class="col-12 text-center py-5">
                <i class="fa-regular fa-folder-open fa-3x text-secondary mb-3"></i>
                <h4 class="text-secondary">No Books Found</h4>
                <p class="text-secondary">Try adjusting your keywords or category filters.</p>
            </div>

            <!-- Loop Book Card -->
            <div th:each="b : ${book}" class="col-lg-3 col-md-4 col-sm-6 mb-4">
                <div class="book-card">
                    <span class="book-card-badge" th:text="${b.category != null && b.category != '' ? b.category : 'General'}">Category</span>
                    
                    <!-- Cover image -->
                    <a th:href="@{/book/details/{id}(id=${b.id})}" class="book-card-img-wrapper d-block">
                        <img th:if="${b.coverImage != null}" th:src="@{/book/cover/{id}(id=${b.id})}" alt="Cover Image" class="book-card-img"/>
                        <img th:if="${b.coverImage == null}" src="/images/book.jpeg" alt="Cover Placeholder" class="book-card-img"/>
                    </a>
                    
                    <div class="book-card-body">
                        <a th:href="@{/book/details/{id}(id=${b.id})}" class="text-decoration-none">
                            <h5 class="book-card-title text-truncate" th:text="${b.name}">Book Name</h5>
                        </a>
                        <span class="book-card-author text-truncate d-block" th:text="'By ' + ${b.author}">Author</span>
                        
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="book-card-price" th:text="'$' + ${b.price}">$25.00</span>
                            
                            <!-- Admin specific buttons -->
                            <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2">
                                <a th:href="@{/editBook/{id}(id=${b.id})}" class="btn btn-sm btn-outline-success border-0 px-2">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </a>
                                <a th:href="@{/deleteBook/{id}(id=${b.id})}" class="btn btn-sm btn-outline-danger border-0 px-2" onclick="return confirm('Are you sure you want to delete this book?');">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="text-center p-5 mt-5">
        <div class="footer-sect text-secondary">CopyRight @ 2026. All Rights Reserved</div>
        <div class="mt-2">
            <a href="#" class="text-decoration-none text-secondary me-3"><i class="fab fa-facebook"></i></a>
            <a href="#" class="text-decoration-none text-secondary me-3"><i class="fab fa-twitter"></i></a>
            <a href="#" class="text-decoration-none text-secondary me-3"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Dark Mode Logic
        const themeToggle = document.getElementById('themeToggle');
        
        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fa-solid fa-sun text-warning"></i>';
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
                localStorage.setItem('theme', 'light');
            }
        }

        themeToggle.addEventListener('click', () => {
            if (document.body.classList.contains('dark-mode')) {
                setTheme('light');
            } else {
                setTheme('dark');
            }
        });

        // Initialize theme
        setTheme(localStorage.getItem('theme') || 'light');
    </script>
  </body>
</html>
