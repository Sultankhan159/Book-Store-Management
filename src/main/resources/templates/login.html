<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://kit.fontawesome.com/0faddc1af8.js" crossorigin="anonymous"></script>
    <title>Login - Nostalgic Novel</title>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container main-content">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-panel text-center">
                    <div class="text-start mb-3">
                        <a th:href="@{/}" class="text-secondary text-decoration-none fw-semibold">
                            <i class="fa-solid fa-arrow-left me-2"></i>Back to Home
                        </a>
                    </div>
                    <div class="mb-4">
                        <img src="/images/book.jpeg" alt="Logo" class="rounded-circle shadow-sm border border-2 border-primary mb-3" style="width: 80px; height: 80px; object-fit: cover;">
                        <h3 class="fw-bold">Sign In</h3>
                        <p class="text-secondary">Access your Nostalgic Novel account</p>
                    </div>
                    
                    <form th:action="@{/login}" method="post">
                        
                        <div th:if="${param.error}" class="alert alert-danger shadow-sm border-0 rounded-3 text-start">
                            <i class="fa-solid fa-triangle-exclamation me-2"></i>Invalid username or password.
                        </div>

                        <div th:if="${param.registered}" class="alert alert-success shadow-sm border-0 rounded-3 text-start">
                            <i class="fa-solid fa-circle-check me-2"></i>Registration successful! Please login.
                        </div>
                        
                        <div class="mb-3 text-start">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border: 2px solid var(--border-color); border-radius: 12px 0 0 12px;"><i class="fa-solid fa-user text-secondary"></i></span>
                                <input type="text" class="form-control form-control-custom border-start-0" style="border-radius: 0 12px 12px 0 !important;"
                                       id="username" name="username" placeholder="Enter username" required>
                            </div>
                        </div>
                        
                        <div class="mb-4 text-start">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border: 2px solid var(--border-color); border-radius: 12px 0 0 12px;"><i class="fa-solid fa-lock text-secondary"></i></span>
                                <input type="password" class="form-control form-control-custom border-start-0" style="border-radius: 0 12px 12px 0 !important;"
                                       id="password" name="password" placeholder="Enter password" required>
                            </div>
                        </div>
                        
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-gradient-primary btn-lg">Sign In</button>
                        </div>
                    </form>

                    <p class="text-secondary mb-0">Don't have an account? 
                        <a th:href="@{/register}" class="text-decoration-none fw-semibold" style="color: #667eea;">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Apply saved theme automatically
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
