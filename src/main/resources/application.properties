spring.application.name=BookstoreManagement
server.port=${PORT:8282}
# Database Configuration
# Defaults to H2 In-Memory database for easy zero-config deployments.
# Can be overridden using environment variables (e.g., SPRING_DATASOURCE_URL) to connect to MySQL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:bookmanager;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Security
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# Session Management
server.servlet.session.timeout=30m
#
# Enable debug logging to see bean creation
logging.level.org.springframework.context=DEBUG
logging.level.org.springframework.beans=DEBUG